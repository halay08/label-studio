title: Anomaly — Polygon Labeling
type: community
group: Computer Vision
order: 0
image: /static/templates/anomaly-polygon.png
details: |
  <h1>Drone Infrastructure Anomaly Detection</h1>
  <dl>
    <dt>Description</dt>
    <dd>Draw polygons to annotate anomalies on drone imagery of infrastructure.</dd>
    <dt>Supported Labels</dt>
    <dd>water_leak, crack, rust, corrosion, vegetation, debris, structural_damage, puddle</dd>
    <dt>Instructions</dt>
    <dd>Select a label from the bar below, then draw a polygon on the image.</dd>
    <dt>Note</dt>
    <dd>One label row only (PolygonLabels). A separate KeyPointLabels strip used to exist for SAM &quot;smart&quot; prompts but duplicated every class in the UI — removed on purpose.</dd>
  </dl>
# Labeling XML: giữ đồng bộ với template/label_config.xml (cùng thư mục gallery, một lần COPY template/).
config: |
  <!-- Single PolygonLabels toolbar — no KeyPointLabels (would duplicate class rows in UI). -->
  <!-- SAM ML backend writes polygonlabels with from_name=anomaly; training exports YOLO from polygons. -->
  <View>
    <Header value="Select a label, then click on the defect (or draw manually)" />
    <Image name="image" value="$image" zoom="true" />
    <PolygonLabels name="anomaly" toName="image" strokeWidth="2" pointSize="small" opacity="0.6">
      <Label value="water_leak" background="red" />
      <Label value="crack" background="blue" />
      <Label value="rust" background="orange" />
      <Label value="corrosion" background="purple" />
      <Label value="vegetation" background="green" />
      <Label value="debris" background="brown" />
      <Label value="structural_damage" background="darkred" />
      <Label value="puddle" background="cyan" />
    </PolygonLabels>
  </View>
